backbone: yolo_v11_s
config_name: deeper_head
dataset:
  augmentation:
    random_brightness:
      args:
        brightness_factor_range:
        - -0.2
        - 0.2
      probability: 0.5
    random_crop:
      args:
        safe_reigon: 0.1
      probability: 0.5
    random_cutout:
      args:
        cutout_size_range:
        - 0.05
        - 0.2
        max_num_cutouts: 2
      probability: 0.5
    random_elastic_deformation:
      args:
        alpha_range:
        - 0.0
        - 0.004
        sigma: 1.0
      probability: 0.3
    random_gaussian_noise:
      args:
        sigma_range:
        - 0.0
        - 0.1
      probability: 1.0
    random_gaussian_sharpness:
      args:
        kernel_size: 5
        sigma_range:
        - -1.5
        - 1.5
      probability: 0.3
    random_horizontal_flip:
      args: null
      probability: 0.5
    random_hue_shift:
      args:
        hue_shift_range:
        - -0.05
        - 0.05
      probability: 0.5
    random_perspective:
      args:
        perspective_factor_range:
        - -0.05
        - 0.05
      probability: 0.3
    random_resize:
      args:
        height_range:
        - 0.8
        - 1.2
        width_range:
        - 0.8
        - 1.2
      probability: 0.4
    random_rotation:
      args:
        angle_range:
        - -3.14159
        - 3.14159
      probability: 0.4
    random_saturation:
      args:
        saturation_factor_range:
        - 0.8
        - 1.2
      probability: 0.3
    random_scale_intensity:
      args:
        scale_factor_range:
        - 0.8
        - 1.2
      probability: 0.3
    random_shear:
      args:
        shear_x_range:
        - -0.05
        - 0.05
        shear_y_range:
        - -0.05
        - 0.05
      probability: 0.5
    random_vertical_flip:
      args: null
      probability: 0.5
  heatmap_sigma: 4.0
  image_initial_resize_ratio: 0.8
  sigma_xray_noise: 0.025
  split_ratio:
  - 0.8
  - 0.1
  - 0.1
from_logits: true
network:
  head:
    num_convs_for_deep_feature: 3
    num_convs_for_input_feature: 4
    num_convs_for_merged_feature: 3
    num_convs_for_middle_feature: 3
    num_convs_for_shallow_feature: 3
    num_hidden_channels: 64
  input_image_shape:
  - 640
  - 640
training:
  accumulate: 2
  batch_size: 12
  epochs: 30
  loss_main:
  - bce
  - mse
  loss_weights:
    bce: 0.9
    mse: 0.1
  lr_scheduler:
    args:
      max_lr: 0.003
      min_lr: 1.0e-05
      unfreeze_backbone_epochs: 5
      warmup_epochs: 1
    name: CosineLR
  optimizer:
    args: null
    name: AdamW
    weight_decay: 1.0e-05
  unfreeze_backbone_epochs: 5
